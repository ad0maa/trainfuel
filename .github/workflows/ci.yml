name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: postgres://trainfuel:trainfuel@localhost:5432/trainfuel_ci
  TEST_DATABASE_URL: postgres://trainfuel:trainfuel@localhost:5432/trainfuel_ci_test
  SESSION_SECRET: ci-only-session-secret-not-used-anywhere-else
  WEBHOOK_SECRET: ci-only-webhook-secret-not-used-anywhere-else
  TOKEN_ENCRYPTION_KEY: Y2ktb25seS10b2tlbi1lbmNyeXB0aW9uLWtleS0zMmJ5dGVzIQ==
  OFF_USER_AGENT: TrainFuel-CI/1.0 (contact: adam.tunchay@gmail.com)

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: trainfuel
          POSTGRES_PASSWORD: trainfuel
          POSTGRES_DB: trainfuel_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Generate Prisma client
        run: yarn cedar prisma generate

      - name: Type check
        run: yarn cedar type-check

      - name: Lint
        run: yarn cedar lint

      - name: Apply migrations to CI database
        run: yarn cedar prisma migrate deploy

      - name: Test
        run: yarn cedar test --no-watch
